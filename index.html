<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生グラフ — ライフライン</title>
<style>
  :root{
    --ink:#3a2c22; --ink-soft:#917a66; --paper:#fdf3e7; --card:#fffaf2;
    --line:#ecd6bb; --pos:#e08b2e; --pos-fill:#e08b2e1f; --neg:#c75a45; --neg-fill:#c75a4520;
    --axis:#bda079; --accent:#ec6a1f; --add:#ed6a1e; --add-dark:#cf560f;
    --shadow:0 1px 2px #3a2c2210, 0 8px 24px #3a2c2214;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--paper); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    line-height:1.6; padding:24px 16px 80px;}
  .wrap{max-width:1040px; margin:0 auto}
  h1{font-size:22px; font-weight:700; margin:0 0 4px}
  .sub{color:var(--ink-soft); font-size:13px; margin:0}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px; box-shadow:var(--shadow); margin:16px 0}
  .panel h2{font-size:14px; margin:0 0 10px; color:var(--accent); font-weight:700}
  .fields{display:flex; gap:14px; flex-wrap:wrap}
  .fields label{font-size:12px; color:var(--ink-soft); display:flex; flex-direction:column; gap:3px}
  .fields input{border:1px solid var(--line); background:#fffefb; border-radius:8px;
    padding:7px 10px; font-size:14px; color:var(--ink); width:130px}

  .chartcard{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 14px; box-shadow:var(--shadow); margin:16px 0}
  .charttools{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:9px; overflow:hidden}
  .seg button{border:none; background:#fff; color:var(--ink-soft); padding:8px 14px; font-size:13px; cursor:pointer; font-weight:600}
  .seg button.on{background:var(--accent); color:#fff}
  .tbtn{border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:9px; padding:8px 12px; font-size:13px; cursor:pointer; font-weight:600}
  .tbtn:hover{border-color:var(--accent); color:var(--accent)}
  .tbtn.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  .hint{font-size:11px; color:var(--ink-soft); margin:0 0 8px}
  .plotscroll{overflow-x:auto; display:flex; align-items:flex-start; position:relative; border-radius:8px}
  .yaxis{position:sticky; left:0; z-index:3; background:var(--card); flex:0 0 auto}
  #chart{flex:0 0 auto; display:block; touch-action:auto}
  #chart.draw{touch-action:none; cursor:ns-resize}
  .pt{cursor:pointer}

  .phase-add{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end}
  .phase-add label{font-size:12px; color:var(--ink-soft); display:flex; flex-direction:column; gap:3px}
  .phase-add select,.phase-add input[type=text]{border:1px solid var(--line); background:#fffefb;
    border-radius:8px; padding:7px 9px; font-size:14px; color:var(--ink)}
  .phase-add input[type=text]{min-width:150px}
  .phase-add input[type=color]{width:42px; height:38px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:2px; cursor:pointer}
  .phase-list{display:flex; flex-direction:column; gap:8px; margin-top:12px}
  .phase-item{display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:13px;
    border:1px solid var(--line); border-radius:9px; padding:7px 10px; background:#fffefb}
  .phase-item input[type=color]{width:28px; height:28px; border:1px solid var(--line); border-radius:6px; padding:1px; background:#fff; cursor:pointer; flex:0 0 auto}
  .ph-name{border:1px solid var(--line); border-radius:6px; padding:5px 8px; font-size:13px; font-weight:700; color:var(--ink); background:#fff; min-width:130px; flex:1 1 130px}
  .ph-yr{font-size:12px; color:var(--ink-soft); display:inline-flex; align-items:center; gap:5px}
  .ph-num{width:74px; border:1px solid var(--line); border-radius:6px; padding:4px 6px; font-size:13px; background:#fff; color:var(--ink)}
  .agehint{color:var(--accent); font-weight:600}
  .phase-item button.del{margin-left:auto; border:1px solid var(--line); background:#fff;
    color:var(--ink-soft); border-radius:6px; width:28px; height:26px; cursor:pointer}
  .phase-item button.del:hover{border-color:var(--neg); color:var(--neg)}

  details.yrwrap{margin:16px 0}
  details.yrwrap>summary{cursor:pointer; font-weight:700; color:var(--accent); font-size:14px; padding:6px 0}
  .rowsec{font-size:12px; font-weight:700; color:var(--accent); margin:12px 2px 6px}
  .rowtools{display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin:2px 2px 4px; font-size:12px; color:var(--ink-soft)}
  .yrhead,.yrow{display:grid; grid-template-columns:84px 78px 1fr 46px 2fr; gap:10px; align-items:center}
  .yrhead{font-size:11px; color:var(--ink-soft); padding:4px 12px 2px; font-weight:700}
  .yrow{background:var(--card); border:1px solid var(--line); border-radius:9px;
    padding:7px 12px; box-shadow:var(--shadow); margin-bottom:6px}
  .yrow.stage{background:#fff7ec}
  .yr{font-weight:700; font-size:14px}
  .stname{width:100%; border:1px solid var(--line); background:#fff; border-radius:6px; padding:5px 7px; font-size:13px; font-weight:700; color:var(--ink)}
  .agerange{display:inline-flex; align-items:center; gap:3px; font-size:12px; color:var(--ink-soft)}
  .agerange input{width:38px; border:1px solid var(--line); background:#fff; border-radius:6px; padding:4px 4px; font-size:12px; text-align:center; color:var(--ink)}
  .yrow input[type=number].age{width:100%; border:1px solid var(--line); background:#fffefb; border-radius:6px; padding:5px 6px; font-size:13px; color:var(--ink)}
  .yrow input[type=range]{width:100%; accent-color:var(--accent)}
  .sc{font-variant-numeric:tabular-nums; font-weight:700; font-size:13px; text-align:right}
  .sc.p{color:var(--pos)} .sc.n{color:var(--neg)} .sc.z{color:var(--ink-soft)}
  .yrow input[type=text].memo{width:100%; border:1px solid var(--line); background:#fffefb;
    border-radius:6px; padding:5px 8px; font-size:13px; color:var(--ink)}

  .bar{display:flex; gap:10px; flex-wrap:wrap; margin:16px 0 0; align-items:center; justify-content:center}
  .btn{border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:9px; padding:9px 16px; font-size:14px; cursor:pointer; font-weight:600}
  .btn:hover{border-color:var(--accent); color:var(--accent)}
  .btn.primary{background:var(--accent); color:#fff; border-color:var(--accent)}
  .btn.primary:hover{background:var(--add-dark); border-color:var(--add-dark)}
  .btn.add{background:var(--add); color:#fff; border:none; border-radius:10px; padding:9px 20px; box-shadow:0 3px 10px #ed6a1e40}
  .btn.add:hover{background:var(--add-dark)}
  .btn.ghost{color:var(--ink-soft)}
  .saved{font-size:12px; color:var(--ink-soft)}

  .modal{position:fixed; inset:0; background:#3a2c22aa; z-index:9000; display:flex; align-items:center; justify-content:center; padding:18px}
  .modal .box{background:var(--card); border-radius:14px; padding:20px; width:min(420px,94vw); box-shadow:0 12px 50px #0005}
  .modal h3{margin:0 0 12px; font-size:16px; color:var(--accent)}
  .modal .frow{display:flex; gap:12px; margin-bottom:12px}
  .modal label{font-size:12px; color:var(--ink-soft); display:flex; flex-direction:column; gap:4px; flex:1}
  .modal input,.modal textarea{border:1px solid var(--line); background:#fffefb; border-radius:8px; padding:8px 10px; font-size:14px; color:var(--ink); font-family:inherit}
  .modal textarea{min-height:84px; resize:vertical}
  .modal .acts{display:flex; gap:10px; justify-content:flex-end; margin-top:6px}
  @media(max-width:600px){
    .yrhead,.yrow{grid-template-columns:72px 66px 1fr 40px}
    .yrow .memo-cell{grid-column:1 / -1}
    .yrhead .memo-h{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>人生グラフ — ライフライン</h1>
    <p class="sub">幼少期〜高校は「ひとまとまりの点」、19歳以降は年ごとに、充実度（−100〜+100）と出来事を記録します。</p>
  </header>

  <div class="panel">
    <h2>セットアップ</h2>
    <div class="fields">
      <label>クライエント名／ID（任意）<input id="clientName" type="text" placeholder="例：A.S さん"></label>
      <label>記録日（任意）<input id="sessionDate" type="text" placeholder="例：2026/06/10"></label>
      <label>生まれ年<input id="birthYear" type="number" value="1988"></label>
      <label>終了年<input id="endYear" type="number" value="2026"></label>
    </div>
    <p class="saved" style="margin:8px 0 0">※ 幼少期〜高校は年齢区分（編集可）でひとまとまり。続く年ごとの点は「高校の終了年齢＋1歳」から始まります。</p>
  </div>

  <div class="chartcard">
    <div class="charttools">
      <div class="seg">
        <button id="modeView" class="on">🖐 閲覧・スクロール</button>
        <button id="modeDraw">✏️ ドラッグ入力</button>
      </div>
      <button class="tbtn on" id="bubBtn">💬 吹き出し表示</button>
    </div>
    <p class="hint" id="modeHint">点をタップ → その場で内容・点数・メモを編集できます。</p>
    <div class="plotscroll">
      <svg id="yaxis" class="yaxis"></svg>
      <svg id="chart" aria-label="人生グラフ"></svg>
    </div>
  </div>

  <div class="panel">
    <h2>期間（フェーズ）— 19歳以降の年に色とステータス名</h2>
    <div class="phase-add">
      <label>開始年<select id="phStart"></select></label>
      <label>終了年<select id="phEnd"></select></label>
      <label>名前<input id="phName" type="text" placeholder="例：IT起業務め／◯◯期"></label>
      <label>色<input id="phColor" type="color" value="#d3705a"></label>
      <button class="btn add" id="phAdd">＋ 追加</button>
    </div>
    <div class="phase-list" id="phaseList"></div>
  </div>

  <details class="yrwrap" open>
    <summary>入力一覧</summary>
    <div class="yrhead">
      <div>区分／年</div><div>年齢</div><div>充実度</div><div>点</div><div class="memo-h">出来事メモ</div>
    </div>
    <div class="rowtools">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="showAll"> 年ごとの未入力も表示</label>
    </div>
    <div id="rows"></div>
  </details>

  <div class="bar">
    <button class="btn primary" id="pngBtn">画像で書き出し（PNG）</button>
    <button class="btn ghost" id="resetBtn">全消去リセット</button>
    <span class="saved" id="savedMsg"></span>
  </div>
</div>

<script>
let cfg={birthYear:1988,endYear:2026};
let stages=[
  {id:"s0",name:"幼少期",a0:0,a1:6,score:0,memo:"",color:"#e0913a"},
  {id:"s1",name:"小学生",a0:7,a1:12,score:0,memo:"",color:"#7fa96a"},
  {id:"s2",name:"中学生",a0:13,a1:15,score:0,memo:"",color:"#5a9bb0"},
  {id:"s3",name:"高校生",a0:16,a1:18,score:0,memo:"",color:"#6f7fc4"},
];
let years=[];      // {year,age,score,memo}
let phases=[];     // {id,start,end,name,color}
let meta={clientName:"",sessionDate:""};
let showBubbles=true, mode="view", showAll=false;

const $=id=>document.getElementById(id);
const rowsEl=$("rows"), chart=$("chart"), yaxisEl=$("yaxis"), savedMsg=$("savedMsg");
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmt=v=>(v>0?"+":"")+v;
const hasData=y=> y.score!==0 || (y.memo&&y.memo.trim());

/* 統合ポイント（左から：4区分 → 年ごと） */
const nPts=()=>stages.length+years.length;
const ptScore=i=> i<stages.length?stages[i].score:years[i-stages.length].score;
const ptMemo =i=> i<stages.length?stages[i].memo :years[i-stages.length].memo;
function setPtScore(i,v){ if(i<stages.length)stages[i].score=v; else years[i-stages.length].score=v; }

/* ---------- 保存 ---------- */
async function save(){ try{ await window.storage.set("lifegraph:v4",JSON.stringify({cfg,stages,years,phases,meta})); flash("保存しました"); }catch(e){} }
function flash(t){ savedMsg.textContent=t; clearTimeout(flash._t); flash._t=setTimeout(()=>savedMsg.textContent="",1500); }
async function load(){
  try{ const r=await window.storage.get("lifegraph:v4");
    if(r&&r.value){ const o=JSON.parse(r.value); cfg=o.cfg||cfg; stages=o.stages||stages; years=o.years||[]; phases=o.phases||[]; meta=o.meta||meta; }
  }catch(e){}
  if(!years.length) regenYears(false);
  $("clientName").value=meta.clientName||""; $("sessionDate").value=meta.sessionDate||"";
  $("birthYear").value=cfg.birthYear; $("endYear").value=cfg.endYear;
}

/* ---------- 年データ（19歳以降） ---------- */
function yearStartAge(){ return Math.max(...stages.map(s=>s.a1))+1; }
function regenYears(recalcAge){
  const fyAge=yearStartAge();
  let fy=cfg.birthYear+fyAge, ey=cfg.endYear; if(ey<fy)ey=fy; if(ey-fy>120)ey=fy+120;
  const prev={}; years.forEach(y=>prev[y.year]=y);
  const arr=[];
  for(let y=fy;y<=ey;y++){ const old=prev[y];
    let age=(recalcAge||!old)?(cfg.birthYear? y-cfg.birthYear : ""):old.age;
    arr.push({year:y,age,score:old?old.score:0,memo:old?old.memo:""}); }
  years=arr;
  const s=fy,e=ey;
  phases=phases.filter(p=>p.end>=s&&p.start<=e).map(p=>({...p,start:Math.max(p.start,s),end:Math.min(p.end,e)}));
}

/* ---------- 行UI ---------- */
function scClass(v){return v>0?"p":v<0?"n":"z";}
function renderRows(){
  let h=`<div class="rowsec">■ ライフステージ（各区分＝ひとまとまりの点）</div>`;
  stages.forEach((s,si)=>{
    h+=`<div class="yrow stage">
      <input class="stname" type="text" value="${esc(s.name)}" data-s="${si}" data-k="name">
      <span class="agerange"><input type="number" value="${s.a0}" data-s="${si}" data-k="a0">–<input type="number" value="${s.a1}" data-s="${si}" data-k="a1">歳</span>
      <input type="range" min="-100" max="100" step="1" value="${s.score}" data-s="${si}" data-k="score">
      <div class="sc ${scClass(s.score)}" data-ssc="${si}">${fmt(s.score)}</div>
      <div class="memo-cell"><input class="memo" type="text" value="${esc(s.memo)}" data-s="${si}" data-k="memo" placeholder="この時期の出来事…"></div>
    </div>`;
  });
  const vis=showAll?years:years.filter(hasData);
  const range=years.length?`${years[0].year}〜${years[years.length-1].year}`:"—";
  h+=`<div class="rowsec">■ 年ごと（${range}）　<span class="saved">${showAll?'全'+years.length+'年':'入力済み'+vis.length+'件 / 全'+years.length+'年'}</span></div>`;
  if(!vis.length) h+=`<div class="saved" style="padding:6px 12px">未入力です。グラフを「✏️ ドラッグ入力」でなぞるか、点をタップして入力してください。</div>`;
  vis.forEach(y=>{ const i=years.indexOf(y);
    h+=`<div class="yrow">
      <div class="yr">${y.year}</div>
      <input class="age" type="number" value="${y.age}" data-y="${i}" data-k="age" placeholder="歳">
      <input type="range" min="-100" max="100" step="1" value="${y.score}" data-y="${i}" data-k="score">
      <div class="sc ${scClass(y.score)}" data-ysc="${i}">${fmt(y.score)}</div>
      <div class="memo-cell"><input class="memo" type="text" value="${esc(y.memo)}" data-y="${i}" data-k="memo" placeholder="この年の出来事…"></div>
    </div>`; });
  rowsEl.innerHTML=h;
}
let rafId=null;
function drawThrottled(){ if(rafId)return; rafId=requestAnimationFrame(()=>{rafId=null; draw();}); }

rowsEl.addEventListener("input",e=>{
  const t=e.target, k=t.dataset.k; if(!k)return;
  if(t.dataset.s!=null){ const si=+t.dataset.s, s=stages[si];
    if(k==="name")s.name=t.value;
    else if(k==="score"){ s.score=+t.value; const sc=document.querySelector(`[data-ssc="${si}"]`); sc.textContent=fmt(s.score); sc.className="sc "+scClass(s.score); }
    else if(k==="a0"||k==="a1"){ s[k]=t.value===""?0:+t.value; }
    else if(k==="memo")s.memo=t.value;
    drawThrottled(); return;
  }
  if(t.dataset.y!=null){ const i=+t.dataset.y, y=years[i];
    if(k==="score"){ y.score=+t.value; const sc=document.querySelector(`[data-ysc="${i}"]`); sc.textContent=fmt(y.score); sc.className="sc "+scClass(y.score); }
    else if(k==="age"){ y.age=t.value===""?"":+t.value; }
    else if(k==="memo")y.memo=t.value;
    drawThrottled();
  }
});
rowsEl.addEventListener("change",e=>{
  if(e.target.dataset.s!=null && (e.target.dataset.k==="a0"||e.target.dataset.k==="a1")){ regenYears(false); refreshAll(); }
  save();
});
$("showAll").onchange=e=>{ showAll=e.target.checked; renderRows(); };

/* ---------- フェーズUI（年のみ） ---------- */
function fillYearSelects(){
  const opts=years.map(y=>`<option value="${y.year}">${y.year}（${y.age!==""?y.age+"歳":""}）</option>`).join("");
  $("phStart").innerHTML=opts; $("phEnd").innerHTML=opts;
  if(years.length) $("phEnd").value=years[years.length-1].year;
}
function renderPhases(){
  if(!phases.length){ $("phaseList").innerHTML=`<div class="saved">まだ期間がありません。19歳以降の年を選んで追加してください。</div>`; return; }
  $("phaseList").innerHTML=phases.map(p=>{
    const sa=cfg.birthYear?`<span class="agehint">${p.start-cfg.birthYear}歳</span>`:"";
    const ea=cfg.birthYear?`<span class="agehint">${p.end-cfg.birthYear}歳</span>`:"";
    return `<div class="phase-item" data-id="${p.id}">
      <input type="color" value="${p.color}" data-k="color" title="色">
      <input type="text" class="ph-name" value="${esc(p.name)}" data-k="name" placeholder="期間名">
      <span class="ph-yr">開始<input type="number" class="ph-num" value="${p.start}" data-k="start">${sa}</span>
      <span class="ph-yr">終了<input type="number" class="ph-num" value="${p.end}" data-k="end">${ea}</span>
      <button class="del" data-del="${p.id}" title="削除">✕</button>
    </div>`; }).join("");
}
$("phAdd").onclick=()=>{ if(!years.length)return; let s=+$("phStart").value,e=+$("phEnd").value; if(s>e)[s,e]=[e,s];
  const name=$("phName").value.trim()||"（無題の期間）";
  phases.push({id:Date.now(),start:s,end:e,name,color:$("phColor").value}); $("phName").value="";
  renderPhases(); draw(); save(); };
$("phaseList").addEventListener("input",e=>{
  const item=e.target.closest(".phase-item"); if(!item)return; const k=e.target.dataset.k; if(!k)return;
  const p=phases.find(x=>x.id==item.dataset.id); if(!p)return;
  if(k==="name")p.name=e.target.value;
  else if(k==="color")p.color=e.target.value;
  else { let v=+e.target.value; if(years.length){ const s=years[0].year,en=years[years.length-1].year; v=Math.max(s,Math.min(en,v)); } p[k]=v; }
  draw();
});
$("phaseList").addEventListener("change",e=>{
  const item=e.target.closest(".phase-item"); if(!item)return; const p=phases.find(x=>x.id==item.dataset.id);
  if(p&&p.start>p.end)[p.start,p.end]=[p.end,p.start]; renderPhases(); draw(); save();
});
$("phaseList").addEventListener("click",e=>{ const b=e.target.closest("[data-del]"); if(!b)return;
  phases=phases.filter(p=>p.id!=b.dataset.del); renderPhases(); draw(); save(); });

/* ---------- セットアップ ---------- */
$("clientName").addEventListener("input",e=>meta.clientName=e.target.value);
$("sessionDate").addEventListener("input",e=>meta.sessionDate=e.target.value);
["clientName","sessionDate"].forEach(id=>$(id).addEventListener("change",save));
$("birthYear").addEventListener("change",e=>{cfg.birthYear=+e.target.value||0; regenYears(true); refreshAll(); save();});
$("endYear").addEventListener("change",e=>{cfg.endYear=+e.target.value||cfg.endYear; regenYears(false); refreshAll(); save();});

function setMode(m){ mode=m;
  $("modeView").classList.toggle("on",m==="view"); $("modeDraw").classList.toggle("on",m==="draw");
  chart.classList.toggle("draw",m==="draw");
  $("modeHint").textContent=m==="draw"?"点を上下にドラッグ／なぞって点数を入力。横移動は閲覧モードでスクロール。":"点をタップ → その場で内容・点数・メモを編集できます。";
}
$("modeView").onclick=()=>setMode("view"); $("modeDraw").onclick=()=>setMode("draw");
$("bubBtn").onclick=()=>{ showBubbles=!showBubbles; $("bubBtn").classList.toggle("on",showBubbles); $("bubBtn").textContent=showBubbles?"💬 吹き出し表示":"💬 印のみ表示"; draw(); };
$("resetBtn").onclick=()=>{ if(confirm("すべての入力を消去して初期状態に戻します。よろしいですか？")){
  cfg={birthYear:1988,endYear:2026};
  stages=[{id:"s0",name:"幼少期",a0:0,a1:6,score:0,memo:"",color:"#e0913a"},{id:"s1",name:"小学生",a0:7,a1:12,score:0,memo:"",color:"#7fa96a"},{id:"s2",name:"中学生",a0:13,a1:15,score:0,memo:"",color:"#5a9bb0"},{id:"s3",name:"高校生",a0:16,a1:18,score:0,memo:"",color:"#6f7fc4"}];
  years=[]; phases=[]; meta={clientName:"",sessionDate:""}; regenYears(false);
  $("clientName").value=""; $("sessionDate").value=""; $("birthYear").value=1988; $("endYear").value=2026; refreshAll(); save(); } };

function refreshAll(){ renderRows(); fillYearSelects(); renderPhases(); draw(); }

/* ---------- レイアウト ---------- */
let LW=900,LH=640,H=600;
const AXISW=54, PADL=22, padR=48, padTop=14;
const CATH=28, AXLABH=44, GAP=8, PLOTH=300;
const STAGE_SP=116, YEAR_SP=50;          // 区分=広め / 年=狭め
const plotTop=padTop+CATH+AXLABH+GAP, plotBottom=plotTop+PLOTH;
const yOf=v=>plotTop+(100-v)/200*PLOTH;

let LAY={cx:[],L:[],R:[],totalW:520};
function computeLayout(){
  const w=[]; for(let i=0;i<nPts();i++) w.push(i<stages.length?STAGE_SP:YEAR_SP);
  const cx=[],L=[],R=[]; let cur=PADL;
  for(let i=0;i<w.length;i++){ L[i]=cur; cx[i]=cur+w[i]/2; cur+=w[i]; R[i]=cur; }
  LAY={cx,L,R,totalW:Math.max(520,cur-PADL)}; return LAY;
}
function plotW(){ return LAY.totalW; }
function xOf(i){ return LAY.cx[i]!==undefined? LAY.cx[i] : PADL+LAY.totalW/2; }

function wrapText(t,max=14,maxLines=3){
  t=(t||"").replace(/\r/g,""); const out=[];
  t.split("\n").forEach(p=>{let line="";for(const ch of p){if(line.length>=max){out.push(line);line="";}line+=ch;}out.push(line);});
  let lines=out.filter(l=>l!==""); if(!lines.length)lines=[""];
  if(lines.length>maxLines){lines=lines.slice(0,maxLines);lines[maxLines-1]=lines[maxLines-1].slice(0,max-1)+"…";}
  return lines;
}

function drawAxis(){
  let s=`<rect x="0" y="0" width="${AXISW}" height="${H}" fill="var(--card)"/>`;
  [100,50,0,-50,-100].forEach(v=>{ const y=yOf(v);
    s+=`<text x="${AXISW-12}" y="${y+4}" text-anchor="end" font-size="12" fill="var(--ink-soft)" font-weight="${v===0?700:400}">${fmt(v)}</text>`;
    s+=`<line x1="${AXISW-6}" y1="${y}" x2="${AXISW}" y2="${y}" stroke="var(--axis)"/>`; });
  s+=`<line x1="${AXISW-0.5}" y1="${plotTop}" x2="${AXISW-0.5}" y2="${plotBottom}" stroke="var(--line)"/>`;
  yaxisEl.setAttribute("viewBox",`0 0 ${AXISW} ${H}`); yaxisEl.setAttribute("width",AXISW); yaxisEl.setAttribute("height",H);
  yaxisEl.innerHTML=s;
}

function draw(){
  computeLayout();
  const n=nPts(), pW=plotW(), CW=PADL+pW+padR, GX1=PADL+pW, yZero=yOf(0);

  // コメント（全件）を下部に段違い配置するためのレーン計算
  const cLineH=15,cPad=7,cFW=11,cFS=11,cGapX=8;
  const ROW=3*cLineH+cPad*2+10;
  const commentTop=plotBottom+30;
  let bubbles=[], numLanes=0;
  if(showBubbles){
    const list=[];
    for(let i=0;i<n;i++){ const m=ptMemo(i); if(m&&m.trim()) list.push({i,x:xOf(i),y:yOf(ptScore(i)),memo:m.trim()}); }
    bubbles=list.map(m=>{ const lines=wrapText(m.memo);
      const bw=Math.max(...lines.map(l=>l.length))*cFW+cPad*2, bh=lines.length*cLineH+cPad*2;
      const bx=Math.max(0,Math.min(m.x-bw/2,GX1-bw));
      return {...m,lines,bw,bh,bx}; });
    const laneRight=[];
    bubbles.forEach(b=>{ let lane=0; for(;lane<laneRight.length;lane++){ if(b.bx>laneRight[lane]+cGapX) break; }
      if(lane===laneRight.length) laneRight.push(0); b.lane=lane; laneRight[lane]=b.bx+b.bw; });
    numLanes=laneRight.length;
  }
  H = numLanes>0 ? commentTop+numLanes*ROW+14 : plotBottom+28;
  LW=AXISW+CW; LH=H;

  drawAxis();
  chart.setAttribute("viewBox",`0 0 ${CW} ${H}`); chart.setAttribute("width",CW); chart.setAttribute("height",H);
  let s="";

  // ゾーン背景
  s+=`<rect x="0" y="${plotTop}" width="${GX1}" height="${yZero-plotTop}" fill="var(--pos-fill)"/>`;
  s+=`<rect x="0" y="${yZero}" width="${GX1}" height="${plotBottom-yZero}" fill="var(--neg-fill)"/>`;

  // 上部カテゴリー：ステージ色帯（プロット内）＋名前ピル（最上段）
  stages.forEach((st,i)=>{ const x=xOf(i);
    const X=Math.max(0,LAY.L[i]+3), Xw=Math.min(GX1,LAY.R[i]-3)-X;
    s+=`<rect x="${X}" y="${plotTop}" width="${Xw}" height="${PLOTH}" fill="${st.color}" opacity="0.16"/>`;
    s+=`<rect x="${X}" y="${plotTop}" width="2" height="${PLOTH}" fill="${st.color}" opacity="0.5"/>`;
    s+=`<rect x="${X+Xw-2}" y="${plotTop}" width="2" height="${PLOTH}" fill="${st.color}" opacity="0.5"/>`;
    const w=st.name.length*12+16;
    s+=`<rect x="${x-w/2}" y="${padTop}" width="${w}" height="22" rx="6" fill="${st.color}" opacity="0.92"/>`;
    s+=`<text x="${x}" y="${padTop+15}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">${esc(st.name)}</text>`;
  });
  if(years.length){ const bx=LAY.L[stages.length];
    s+=`<line x1="${bx}" y1="${plotTop}" x2="${bx}" y2="${plotBottom}" stroke="var(--axis)" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>`; }

  // フェーズ帯（年）＋名前ピル（最上段）
  const yearIdx=yr=>{ const k=years.findIndex(y=>y.year===yr); return k<0?-1:stages.length+k; };
  phases.forEach(p=>{ const si=yearIdx(p.start),ei=yearIdx(p.end); if(si<0||ei<0)return;
    const X=Math.max(0,LAY.L[si]), Xw=Math.min(GX1,LAY.R[ei])-X;
    s+=`<rect x="${X}" y="${plotTop}" width="${Xw}" height="${PLOTH}" fill="${p.color}" opacity="0.16"/>`;
    s+=`<rect x="${X}" y="${plotTop}" width="2.5" height="${PLOTH}" fill="${p.color}" opacity="0.55"/>`;
    s+=`<rect x="${X+Xw-2.5}" y="${plotTop}" width="2.5" height="${PLOTH}" fill="${p.color}" opacity="0.55"/>`;
    const cx=X+Xw/2,w=p.name.length*12+16;
    s+=`<rect x="${cx-w/2}" y="${padTop}" width="${w}" height="22" rx="6" fill="${p.color}" opacity="0.92"/>`;
    s+=`<text x="${cx}" y="${padTop+15}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">${esc(p.name)}</text>`;
  });

  // 西暦・年齢（カテゴリーの下・プロットの上）
  const yearY=padTop+CATH+16, ageY=yearY+15;
  for(let i=0;i<n;i++){ const px=xOf(i);
    if(i<stages.length){ const st=stages[i];
      const y0=cfg.birthYear?cfg.birthYear+st.a0:"", y1=cfg.birthYear?cfg.birthYear+st.a1:"";
      if(y0!=="") s+=`<text x="${px}" y="${yearY}" text-anchor="middle" font-size="10" fill="var(--ink-soft)">${y0}〜${y1}</text>`;
      s+=`<text x="${px}" y="${ageY}" text-anchor="middle" font-size="11" fill="var(--ink)" font-weight="600">${st.a0}〜${st.a1}歳</text>`;
    } else { const y=years[i-stages.length];
      s+=`<text x="${px}" y="${yearY}" text-anchor="middle" font-size="11" fill="var(--ink)" font-weight="600">${y.year}</text>`;
      if(y.age!=="") s+=`<text x="${px}" y="${ageY}" text-anchor="middle" font-size="10" fill="var(--ink-soft)">${y.age}歳</text>`;
    }
  }

  // グリッド
  [100,50,0,-50,-100].forEach(v=>{ const y=yOf(v),zero=v===0;
    s+=`<line x1="0" y1="${y}" x2="${GX1}" y2="${y}" stroke="${zero?'var(--axis)':'var(--line)'}" stroke-width="${zero?2:1}"/>`; });

  // 折れ線
  const pts=[]; for(let i=0;i<n;i++) pts.push([xOf(i),yOf(ptScore(i))]);
  if(n>=2){ let d="M"+pts.map(p=>p[0]+" "+p[1]).join(" L ");
    s+=`<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`; }

  // 点＋点数
  for(let i=0;i<n;i++){ const [px,py]=pts[i], sc=ptScore(i), memo=ptMemo(i);
    const col=sc>0?'var(--pos)':sc<0?'var(--neg)':'var(--axis)'; const hm=memo&&memo.trim();
    s+=`<circle class="pt" cx="${px}" cy="${py}" r="${hm?6.5:5.5}" fill="${hm?col:'#fff'}" stroke="${col}" stroke-width="3" data-pt="${i}"></circle>`;
    if(sc!==0||hm){ const above=sc>=0;
      s+=`<text x="${px}" y="${py+(above?-11:18)}" text-anchor="middle" font-size="10" fill="${col}" font-weight="700">${fmt(sc)}</text>`; }
  }

  // 下部コメント（全件・段違い・非重複）
  bubbles.forEach(b=>{ const by=commentTop+b.lane*ROW;
    const lx=Math.max(b.bx+12,Math.min(b.x,b.bx+b.bw-12));
    s+=`<line x1="${b.x}" y1="${plotBottom}" x2="${lx}" y2="${by}" stroke="var(--accent)" stroke-width="1" opacity=".45"/>`;
    s+=`<rect x="${b.bx}" y="${by}" width="${b.bw}" height="${b.bh}" rx="8" fill="var(--card)" stroke="var(--line)"/>`;
    b.lines.forEach((l,li)=>{ s+=`<text x="${b.bx+cPad}" y="${by+cPad+12+li*cLineH}" font-size="${cFS}" fill="var(--ink)">${esc(l)}</text>`; });
  });

  chart.innerHTML=s;
}

/* ---------- ドラッグ入力 ---------- */
function svgPoint(e){ const r=chart.getBoundingClientRect(); computeLayout(); const CW=PADL+plotW()+padR;
  return {x:(e.clientX-r.left)*(CW/r.width), y:(e.clientY-r.top)*(H/r.height)}; }
function scoreFromY(y){ return Math.max(-100,Math.min(100,Math.round(100-(y-plotTop)/PLOTH*200))); }
function idxFromX(x){ computeLayout(); const n=nPts(); let best=0,bd=Infinity;
  for(let i=0;i<n;i++){ const d=Math.abs(x-LAY.cx[i]); if(d<bd){bd=d;best=i;} } return best; }
let dragging=false;
chart.addEventListener("pointerdown",e=>{ if(mode!=="draw")return; e.preventDefault();
  dragging=true; const p=svgPoint(e); setPtScore(idxFromX(p.x),scoreFromY(p.y)); drawThrottled(); chart.setPointerCapture(e.pointerId); });
chart.addEventListener("pointermove",e=>{ if(!dragging)return; const p=svgPoint(e); setPtScore(idxFromX(p.x),scoreFromY(p.y)); drawThrottled(); });
function endDrag(){ if(!dragging)return; dragging=false; renderRows(); save(); }
chart.addEventListener("pointerup",endDrag); chart.addEventListener("pointercancel",endDrag);

chart.addEventListener("click",e=>{ if(mode!=="view")return; const c=e.target.closest("[data-pt]"); if(!c)return; openEditor(+c.dataset.pt); });

/* ---------- 編集モーダル ---------- */
function openEditor(i){
  let m=$("editModal"); if(m)m.remove(); m=document.createElement("div"); m.id="editModal"; m.className="modal";
  const isStage=i<stages.length;
  if(isStage){ const s=stages[i];
    m.innerHTML=`<div class="box"><h3>${esc(s.name)}（区分）</h3>
      <div class="frow"><label>区分名<input id="edName" type="text" value="${esc(s.name)}"></label></div>
      <div class="frow"><label>開始年齢<input id="edA0" type="number" value="${s.a0}"></label>
        <label>終了年齢<input id="edA1" type="number" value="${s.a1}"></label>
        <label>点数<input id="edScore" type="number" min="-100" max="100" value="${s.score}"></label></div>
      <label>出来事メモ<textarea id="edMemo" placeholder="この時期の出来事・気持ち…">${esc(s.memo)}</textarea></label>
      <div class="acts"><button class="btn ghost" id="edClose">閉じる</button><button class="btn primary" id="edSave">保存</button></div></div>`;
  } else { const y=years[i-stages.length];
    m.innerHTML=`<div class="box"><h3>${y.year}年 の記録</h3>
      <div class="frow"><label>年齢<input id="edAge" type="number" value="${y.age}"></label>
        <label>点数（−100〜+100）<input id="edScore" type="number" min="-100" max="100" value="${y.score}"></label></div>
      <label>出来事メモ<textarea id="edMemo" placeholder="この年の出来事・気持ち…">${esc(y.memo)}</textarea></label>
      <div class="acts"><button class="btn ghost" id="edClose">閉じる</button><button class="btn primary" id="edSave">保存</button></div></div>`;
  }
  document.body.appendChild(m);
  m.addEventListener("click",e=>{ if(e.target===m)m.remove(); });
  $("edClose").onclick=()=>m.remove();
  $("edSave").onclick=()=>{
    const sc=Math.max(-100,Math.min(100,+($("edScore").value)||0));
    if(isStage){ const s=stages[i]; s.name=$("edName").value||s.name; s.a0=+$("edA0").value||0; s.a1=+$("edA1").value||0; s.score=sc; s.memo=$("edMemo").value; regenYears(false); }
    else { const y=years[i-stages.length]; const a=$("edAge").value; y.age=a===""?"":+a; y.score=sc; y.memo=$("edMemo").value; }
    m.remove(); refreshAll(); save();
  };
  setTimeout(()=>$("edMemo").focus(),50);
}

/* ---------- PNG ---------- */
function showPngOverlay(url){
  let ov=$("pngOverlay"); if(ov)ov.remove(); ov=document.createElement("div"); ov.id="pngOverlay";
  ov.style.cssText="position:fixed;inset:0;background:#3a2c22cc;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px";
  ov.innerHTML=`<div style="color:#fff;font-size:13px;text-align:center">画像ができました。ボタンで保存、または画像を長押し／右クリックで保存できます。</div>
    <img src="${url}" style="max-width:92vw;max-height:70vh;border-radius:10px;box-shadow:0 8px 40px #0006;background:#fff">
    <div style="display:flex;gap:10px">
      <a href="${url}" download="${(meta.clientName||'lifegraph')}.png" style="background:#ed6a1e;color:#fff;text-decoration:none;font-weight:700;padding:11px 22px;border-radius:10px;font-size:14px">⬇ ダウンロード</a>
      <button id="pngClose" style="background:#fff;border:none;padding:11px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">閉じる</button></div>`;
  document.body.appendChild(ov); $("pngClose").onclick=()=>ov.remove(); ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
}
$("pngBtn").onclick=()=>{
  try{
    const cs=getComputedStyle(document.documentElement);
    const vars=["--ink","--ink-soft","--paper","--card","--line","--pos","--neg","--axis","--accent","--pos-fill","--neg-fill"];
    const CW=PADL+plotW()+padR, fullW=AXISW+CW, BAND=52, fullH=H+BAND;
    const title=(meta.clientName?meta.clientName+'　':'')+'人生グラフ'+(meta.sessionDate?'　'+meta.sessionDate:'');
    let raw=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${fullW} ${fullH}" width="${fullW}" height="${fullH}" style="background:var(--paper)">
      <g>${yaxisEl.innerHTML}</g><g transform="translate(${AXISW},0)">${chart.innerHTML}</g>
      <text x="${fullW/2}" y="${H+34}" text-anchor="middle" font-size="17" font-weight="700" fill="var(--ink)" font-family="sans-serif">${esc(title)}</text></svg>`;
    vars.forEach(v=>{ raw=raw.split(`var(${v})`).join(cs.getPropertyValue(v).trim()); });
    const url="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(raw);
    const img=new Image();
    img.onload=()=>{ try{ const scl=2,cv=document.createElement("canvas"); cv.width=fullW*scl; cv.height=fullH*scl;
        const ctx=cv.getContext("2d"); ctx.fillStyle=cs.getPropertyValue('--paper').trim(); ctx.fillRect(0,0,cv.width,cv.height);
        ctx.drawImage(img,0,0,cv.width,cv.height); const png=cv.toDataURL("image/png");
        const a=document.createElement("a"); a.href=png; a.download=(meta.clientName||"lifegraph")+".png"; document.body.appendChild(a); a.click(); a.remove(); showPngOverlay(png);
      }catch(err){ alert("画像生成に失敗：\n"+err.message); } };
    img.onerror=()=>alert("画像読込に失敗しました。年数やメモを減らしてお試しください。");
    img.src=url;
  }catch(err){ alert("書き出しエラー：\n"+err.message); }
};

(async()=>{ await load(); refreshAll(); })();
</script>
