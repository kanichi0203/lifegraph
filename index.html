<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生グラフ — ライフライン</title>
<style>
  :root{
    --ink:#3a2c22; --ink-soft:#917a66; --paper:#fdf3e7; --card:#fffaf2;
    --line:#ecd6bb; --pos:#e08b2e; --pos-fill:#e08b2e1f; --neg:#c75a45; --neg-fill:#c75a4520;
    --axis:#bda079; --accent:#ec6a1f; --add:#ed6a1e; --add-dark:#cf560f;
    --shadow:0 1px 2px #3a2c2210, 0 8px 24px #3a2c2214;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--paper); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    line-height:1.6; padding:24px 16px 80px;}
  .wrap{max-width:1040px; margin:0 auto}
  h1{font-size:22px; font-weight:700; margin:0 0 4px}
  .sub{color:var(--ink-soft); font-size:13px; margin:0}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px; box-shadow:var(--shadow); margin:16px 0}
  .panel h2{font-size:14px; margin:0 0 10px; color:var(--accent); font-weight:700}
  .fields{display:flex; gap:14px; flex-wrap:wrap}
  .fields label{font-size:12px; color:var(--ink-soft); display:flex; flex-direction:column; gap:3px}
  .fields input{border:1px solid var(--line); background:#fffefb; border-radius:8px;
    padding:7px 10px; font-size:14px; color:var(--ink); width:150px}

  .chartcard{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 14px; box-shadow:var(--shadow); margin:16px 0}
  .charttools{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:9px; overflow:hidden}
  .seg button{border:none; background:#fff; color:var(--ink-soft); padding:8px 14px; font-size:13px; cursor:pointer; font-weight:600}
  .seg button.on{background:var(--accent); color:#fff}
  .tbtn{border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:9px; padding:8px 12px; font-size:13px; cursor:pointer; font-weight:600}
  .tbtn:hover{border-color:var(--accent); color:var(--accent)}
  .tbtn.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  .hint{font-size:11px; color:var(--ink-soft); margin:0 0 8px}
  .plotscroll{overflow-x:auto; display:flex; align-items:flex-start; position:relative; border-radius:8px}
  .yaxis{position:sticky; left:0; z-index:3; background:var(--card); flex:0 0 auto}
  #chart{flex:0 0 auto; display:block; touch-action:auto}
  #chart.draw{touch-action:none; cursor:ns-resize}
  .pt{cursor:pointer}

  .seglist{display:flex; flex-direction:column; gap:8px}
  .segrow{display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    background:#fff7ec; border:1px solid var(--line); border-radius:10px; padding:9px 12px; box-shadow:var(--shadow)}
  .segrow input[type=color]{width:30px; height:30px; border:1px solid var(--line); border-radius:7px; padding:1px; background:#fff; cursor:pointer; flex:0 0 auto}
  .segrow .nm{flex:1 1 110px; min-width:90px; border:1px solid var(--line); background:#fff; border-radius:7px; padding:6px 9px; font-size:14px; font-weight:700; color:var(--ink)}
  .agebox{display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--ink-soft); flex:0 0 auto}
  .agebox input{width:46px; border:1px solid var(--line); background:#fff; border-radius:7px; padding:6px 4px; font-size:13px; text-align:center; color:var(--ink)}
  .segrow .sl{flex:2 1 200px; display:flex; align-items:center; gap:10px; min-width:180px}
  .segrow .sl input[type=range]{flex:1; accent-color:var(--accent)}
  .sc{font-variant-numeric:tabular-nums; font-weight:700; font-size:14px; width:46px; text-align:right}
  .sc.p{color:var(--pos)} .sc.n{color:var(--neg)} .sc.z{color:var(--ink-soft)}
  .segrow .mn{flex:3 1 240px; min-width:180px; border:1px solid var(--line); background:#fffefb; border-radius:7px; padding:6px 9px; font-size:13px; color:var(--ink)}
  .segrow .del{border:1px solid var(--line); background:#fff; color:var(--ink-soft); border-radius:7px; width:30px; height:30px; cursor:pointer; flex:0 0 auto}
  .segrow .del:hover{border-color:var(--neg); color:var(--neg)}
  .yhint{font-size:11px; color:var(--accent); flex:0 0 auto}

  .bar{display:flex; gap:10px; flex-wrap:wrap; margin:16px 0 0; align-items:center; justify-content:center}
  .btn{border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:9px; padding:9px 16px; font-size:14px; cursor:pointer; font-weight:600}
  .btn:hover{border-color:var(--accent); color:var(--accent)}
  .btn.primary{background:var(--accent); color:#fff; border-color:var(--accent)}
  .btn.primary:hover{background:var(--add-dark); border-color:var(--add-dark)}
  .btn.add{background:var(--add); color:#fff; border:none; border-radius:10px; padding:11px 24px; box-shadow:0 3px 10px #ed6a1e40}
  .btn.add:hover{background:var(--add-dark)}
  .btn.ghost{color:var(--ink-soft)}
  .addrow{display:flex; justify-content:center; margin:14px 0 4px}
  .saved{font-size:12px; color:var(--ink-soft)}

  .modal{position:fixed; inset:0; background:#3a2c22aa; z-index:9000; display:flex; align-items:center; justify-content:center; padding:18px}
  .modal .box{background:var(--card); border-radius:14px; padding:20px; width:min(440px,94vw); box-shadow:0 12px 50px #0005}
  .modal h3{margin:0 0 12px; font-size:16px; color:var(--accent)}
  .modal .frow{display:flex; gap:12px; margin-bottom:12px}
  .modal label{font-size:12px; color:var(--ink-soft); display:flex; flex-direction:column; gap:4px; flex:1}
  .modal input,.modal textarea{border:1px solid var(--line); background:#fffefb; border-radius:8px; padding:8px 10px; font-size:14px; color:var(--ink); font-family:inherit}
  .modal input[type=color]{padding:2px; height:38px}
  .modal textarea{min-height:84px; resize:vertical}
  .modal .acts{display:flex; gap:10px; justify-content:flex-end; margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>人生グラフ — ライフライン</h1>
    <p class="sub">年齢で自由に区切ったライフステージごとに、充実度（−100〜+100）と出来事を記録します。1年だけの区分も作れます。</p>
  </header>

  <div class="panel">
    <h2>セットアップ</h2>
    <div class="fields">
      <label>クライエント名／ID（任意）<input id="clientName" type="text" placeholder="例：A.S さん"></label>
      <label>記録日（任意）<input id="sessionDate" type="text" placeholder="例：2026/06/10"></label>
      <label>生まれ年（西暦表示用・任意）<input id="birthYear" type="number" value="1988"></label>
    </div>
    <p class="saved" style="margin:8px 0 0">※ 生まれ年を入れると、各区分の西暦も表示されます。空欄でも年齢だけで使えます。</p>
  </div>

  <div class="chartcard">
    <div class="charttools">
      <div class="seg">
        <button id="modeView" class="on">🖐 閲覧・スクロール</button>
        <button id="modeDraw">✏️ ドラッグ入力</button>
      </div>
      <button class="tbtn on" id="bubBtn">💬 コメント表示</button>
    </div>
    <p class="hint" id="modeHint">点をタップ → その場で区分名・年齢・点数・メモを編集できます。</p>
    <div class="plotscroll">
      <svg id="yaxis" class="yaxis"></svg>
      <svg id="chart" aria-label="人生グラフ"></svg>
    </div>
  </div>

  <div class="panel">
    <h2>ライフステージ（年齢区分）</h2>
    <p class="saved" style="margin:-4px 0 10px">開始＝終了 にすると「1年だけ」の区分になります。並びは年齢順に自動整列。</p>
    <div class="seglist" id="seglist"></div>
    <div class="addrow"><button class="btn add" id="addSeg">＋ 区分を追加</button></div>
  </div>

  <div class="bar">
    <button class="btn primary" id="pngBtn">画像で書き出し（PNG）</button>
    <button class="btn ghost" id="resetBtn">全消去リセット</button>
    <span class="saved" id="savedMsg"></span>
  </div>
</div>

<script>
const PALETTE=["#e0913a","#7fa96a","#5a9bb0","#6f7fc4","#a878c0","#d3705a","#cf9b3f","#5fae93","#c2698f","#8a8f5c"];
let cfg={birthYear:1988};
let segs=[
  {id:"s0",name:"幼少期",a0:0,a1:6,color:"#e0913a",score:0,memo:""},
  {id:"s1",name:"小学生",a0:7,a1:12,color:"#7fa96a",score:0,memo:""},
  {id:"s2",name:"中学生",a0:13,a1:15,color:"#5a9bb0",score:0,memo:""},
  {id:"s3",name:"高校生",a0:16,a1:18,color:"#6f7fc4",score:0,memo:""},
];
let meta={clientName:"",sessionDate:""};
let showBubbles=true, mode="view";

const $=id=>document.getElementById(id);
const listEl=$("seglist"), chart=$("chart"), yaxisEl=$("yaxis"), savedMsg=$("savedMsg");
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmt=v=>(v>0?"+":"")+v;
const nPts=()=>segs.length;
const ptScore=i=>segs[i].score, ptMemo=i=>segs[i].memo;
const setPtScore=(i,v)=>segs[i].score=v;
function sortSegs(){ segs.sort((a,b)=>(a.a0-b.a0)||(a.a1-b.a1)); }

/* ---------- 保存 ---------- */
async function save(){ try{ await window.storage.set("lifegraph:v5",JSON.stringify({cfg,segs,meta})); flash("保存しました"); }catch(e){} }
function flash(t){ savedMsg.textContent=t; clearTimeout(flash._t); flash._t=setTimeout(()=>savedMsg.textContent="",1500); }
async function load(){
  try{ const r=await window.storage.get("lifegraph:v5");
    if(r&&r.value){ const o=JSON.parse(r.value); cfg=o.cfg||cfg; segs=o.segs||segs; meta=o.meta||meta; }
  }catch(e){}
  $("clientName").value=meta.clientName||""; $("sessionDate").value=meta.sessionDate||""; $("birthYear").value=cfg.birthYear||"";
}

/* ---------- 区分リストUI ---------- */
function scClass(v){return v>0?"p":v<0?"n":"z";}
function yhint(s){ if(!cfg.birthYear)return ""; const y0=cfg.birthYear+s.a0, y1=cfg.birthYear+s.a1;
  return s.a0===s.a1? `${y0}` : `${y0}〜${y1}`; }
function renderList(){
  listEl.innerHTML=segs.map((s,i)=>`
    <div class="segrow" data-id="${s.id}">
      <input type="color" value="${s.color}" data-k="color" title="色">
      <input class="nm" type="text" value="${esc(s.name)}" data-k="name" placeholder="区分名">
      <span class="agebox"><input type="number" value="${s.a0}" data-k="a0">–<input type="number" value="${s.a1}" data-k="a1">歳</span>
      <span class="yhint">${yhint(s)}</span>
      <span class="sl"><input type="range" min="-100" max="100" step="1" value="${s.score}" data-k="score">
        <span class="sc ${scClass(s.score)}" data-sc="${s.id}">${fmt(s.score)}</span></span>
      <input class="mn" type="text" value="${esc(s.memo)}" data-k="memo" placeholder="この時期の出来事…">
      <button class="del" data-del="${s.id}" title="削除">✕</button>
    </div>`).join("");
}
let rafId=null; function drawThrottled(){ if(rafId)return; rafId=requestAnimationFrame(()=>{rafId=null; draw();}); }

listEl.addEventListener("input",e=>{
  const row=e.target.closest(".segrow"); if(!row)return; const k=e.target.dataset.k; if(!k)return;
  const s=segs.find(x=>x.id===row.dataset.id); if(!s)return;
  if(k==="name")s.name=e.target.value;
  else if(k==="color")s.color=e.target.value;
  else if(k==="memo")s.memo=e.target.value;
  else if(k==="score"){ s.score=+e.target.value; const sc=document.querySelector(`[data-sc="${s.id}"]`); sc.textContent=fmt(s.score); sc.className="sc "+scClass(s.score); }
  else if(k==="a0"||k==="a1"){ s[k]=e.target.value===""?0:+e.target.value; }
  drawThrottled();
});
listEl.addEventListener("change",e=>{
  const row=e.target.closest(".segrow"); if(row){ const s=segs.find(x=>x.id===row.dataset.id);
    if(s&&s.a0>s.a1)[s.a0,s.a1]=[s.a1,s.a0]; sortSegs(); renderList(); draw(); }
  save();
});
listEl.addEventListener("click",e=>{ const b=e.target.closest("[data-del]"); if(!b)return;
  if(segs.length<=1){ alert("区分は最低1つ必要です。"); return; }
  segs=segs.filter(s=>s.id!==b.dataset.del); renderList(); draw(); save(); });

$("addSeg").onclick=()=>{
  const mx=segs.length?Math.max(...segs.map(s=>s.a1)):-1; const a=mx+1;
  segs.push({id:"s"+Date.now(),name:"新しい区分",a0:a,a1:a,color:PALETTE[segs.length%PALETTE.length],score:0,memo:""});
  sortSegs(); renderList(); draw(); save();
};

/* ---------- セットアップ ---------- */
$("clientName").addEventListener("input",e=>meta.clientName=e.target.value);
$("sessionDate").addEventListener("input",e=>meta.sessionDate=e.target.value);
["clientName","sessionDate"].forEach(id=>$(id).addEventListener("change",save));
$("birthYear").addEventListener("change",e=>{ cfg.birthYear=e.target.value===""?0:+e.target.value; renderList(); draw(); save(); });

function setMode(m){ mode=m;
  $("modeView").classList.toggle("on",m==="view"); $("modeDraw").classList.toggle("on",m==="draw");
  chart.classList.toggle("draw",m==="draw");
  $("modeHint").textContent=m==="draw"?"点を上下にドラッグ／なぞって点数を入力。横移動は閲覧モードでスクロール。":"点をタップ → その場で区分名・年齢・点数・メモを編集できます。";
}
$("modeView").onclick=()=>setMode("view"); $("modeDraw").onclick=()=>setMode("draw");
$("bubBtn").onclick=()=>{ showBubbles=!showBubbles; $("bubBtn").classList.toggle("on",showBubbles); $("bubBtn").textContent=showBubbles?"💬 コメント表示":"💬 点のみ表示"; draw(); };
$("resetBtn").onclick=()=>{ if(confirm("すべての入力を消去して初期状態に戻します。よろしいですか？")){
  cfg={birthYear:1988}; meta={clientName:"",sessionDate:""};
  segs=[{id:"s0",name:"幼少期",a0:0,a1:6,color:"#e0913a",score:0,memo:""},{id:"s1",name:"小学生",a0:7,a1:12,color:"#7fa96a",score:0,memo:""},{id:"s2",name:"中学生",a0:13,a1:15,color:"#5a9bb0",score:0,memo:""},{id:"s3",name:"高校生",a0:16,a1:18,color:"#6f7fc4",score:0,memo:""}];
  $("clientName").value=""; $("sessionDate").value=""; $("birthYear").value=1988; refreshAll(); save(); } };

function refreshAll(){ renderList(); draw(); }

/* ---------- レイアウト ---------- */
let LW=900,LH=640,H=600;
const AXISW=54, PADL=22, padR=48, padTop=14;
const CATH=28, AXLABH=44, GAP=8, PLOTH=300;
const plotTop=padTop+CATH+AXLABH+GAP, plotBottom=plotTop+PLOTH;
const yOf=v=>plotTop+(100-v)/200*PLOTH;
const segWidth=s=>Math.max(72,Math.min(210,72+(s.a1-s.a0)*11)); // 期間が長いほど広く（1年=72px）

let LAY={cx:[],L:[],R:[],totalW:520};
function computeLayout(){
  const cx=[],L=[],R=[]; let cur=PADL;
  segs.forEach((s,i)=>{ const w=segWidth(s); L[i]=cur; cx[i]=cur+w/2; cur+=w; R[i]=cur; });
  LAY={cx,L,R,totalW:Math.max(420,cur-PADL)}; return LAY;
}
function plotW(){ return LAY.totalW; }
function xOf(i){ return LAY.cx[i]!==undefined? LAY.cx[i] : PADL+LAY.totalW/2; }

function wrapText(t,max=14,maxLines=3){
  t=(t||"").replace(/\r/g,""); const out=[];
  t.split("\n").forEach(p=>{let line="";for(const ch of p){if(line.length>=max){out.push(line);line="";}line+=ch;}out.push(line);});
  let lines=out.filter(l=>l!==""); if(!lines.length)lines=[""];
  if(lines.length>maxLines){lines=lines.slice(0,maxLines);lines[maxLines-1]=lines[maxLines-1].slice(0,max-1)+"…";}
  return lines;
}

function drawAxis(){
  let s=`<rect x="0" y="0" width="${AXISW}" height="${H}" fill="var(--card)"/>`;
  [100,50,0,-50,-100].forEach(v=>{ const y=yOf(v);
    s+=`<text x="${AXISW-12}" y="${y+4}" text-anchor="end" font-size="12" fill="var(--ink-soft)" font-weight="${v===0?700:400}">${fmt(v)}</text>`;
    s+=`<line x1="${AXISW-6}" y1="${y}" x2="${AXISW}" y2="${y}" stroke="var(--axis)"/>`; });
  s+=`<line x1="${AXISW-0.5}" y1="${plotTop}" x2="${AXISW-0.5}" y2="${plotBottom}" stroke="var(--line)"/>`;
  yaxisEl.setAttribute("viewBox",`0 0 ${AXISW} ${H}`); yaxisEl.setAttribute("width",AXISW); yaxisEl.setAttribute("height",H);
  yaxisEl.innerHTML=s;
}

function draw(){
  computeLayout();
  const n=nPts(), pW=plotW(), CW=PADL+pW+padR, GX1=PADL+pW, yZero=yOf(0);

  // 下部コメント（全件）のレーン計算
  const cLineH=15,cPad=7,cFW=11,cFS=11,cGapX=8, ROW=3*cLineH+cPad*2+10, commentTop=plotBottom+30;
  let bubbles=[], numLanes=0;
  if(showBubbles){
    const list=[]; for(let i=0;i<n;i++){ const m=ptMemo(i); if(m&&m.trim()) list.push({i,x:xOf(i),y:yOf(ptScore(i)),memo:m.trim()}); }
    bubbles=list.map(m=>{ const lines=wrapText(m.memo);
      const bw=Math.max(...lines.map(l=>l.length))*cFW+cPad*2, bh=lines.length*cLineH+cPad*2;
      const bx=Math.max(0,Math.min(m.x-bw/2,GX1-bw)); return {...m,lines,bw,bh,bx}; });
    const laneRight=[]; bubbles.forEach(b=>{ let lane=0; for(;lane<laneRight.length;lane++){ if(b.bx>laneRight[lane]+cGapX) break; }
      if(lane===laneRight.length) laneRight.push(0); b.lane=lane; laneRight[lane]=b.bx+b.bw; });
    numLanes=laneRight.length;
  }
  H = numLanes>0 ? commentTop+numLanes*ROW+14 : plotBottom+28;
  LW=AXISW+CW; LH=H;

  drawAxis();
  chart.setAttribute("viewBox",`0 0 ${CW} ${H}`); chart.setAttribute("width",CW); chart.setAttribute("height",H);
  let s="";
  s+=`<rect x="0" y="${plotTop}" width="${GX1}" height="${yZero-plotTop}" fill="var(--pos-fill)"/>`;
  s+=`<rect x="0" y="${yZero}" width="${GX1}" height="${plotBottom-yZero}" fill="var(--neg-fill)"/>`;

  // 上部カテゴリー（色帯＋名前ピル）
  segs.forEach((st,i)=>{ const x=xOf(i);
    const X=Math.max(0,LAY.L[i]+3), Xw=Math.min(GX1,LAY.R[i]-3)-X;
    s+=`<rect x="${X}" y="${plotTop}" width="${Xw}" height="${PLOTH}" fill="${st.color}" opacity="0.16"/>`;
    s+=`<rect x="${X}" y="${plotTop}" width="2" height="${PLOTH}" fill="${st.color}" opacity="0.5"/>`;
    s+=`<rect x="${X+Xw-2}" y="${plotTop}" width="2" height="${PLOTH}" fill="${st.color}" opacity="0.5"/>`;
    const w=st.name.length*12+16;
    s+=`<rect x="${x-w/2}" y="${padTop}" width="${w}" height="22" rx="6" fill="${st.color}" opacity="0.92"/>`;
    s+=`<text x="${x}" y="${padTop+15}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">${esc(st.name)}</text>`;
  });

  // 西暦・年齢
  const yearY=padTop+CATH+16, ageY=yearY+15;
  segs.forEach((st,i)=>{ const px=xOf(i);
    if(cfg.birthYear){ const y0=cfg.birthYear+st.a0,y1=cfg.birthYear+st.a1;
      s+=`<text x="${px}" y="${yearY}" text-anchor="middle" font-size="10" fill="var(--ink-soft)">${st.a0===st.a1?y0:y0+'〜'+y1}</text>`; }
    s+=`<text x="${px}" y="${ageY}" text-anchor="middle" font-size="11" fill="var(--ink)" font-weight="600">${st.a0===st.a1?st.a0+'歳':st.a0+'〜'+st.a1+'歳'}</text>`;
  });

  // グリッド
  [100,50,0,-50,-100].forEach(v=>{ const y=yOf(v),zero=v===0;
    s+=`<line x1="0" y1="${y}" x2="${GX1}" y2="${y}" stroke="${zero?'var(--axis)':'var(--line)'}" stroke-width="${zero?2:1}"/>`; });

  // 折れ線
  const pts=[]; for(let i=0;i<n;i++) pts.push([xOf(i),yOf(ptScore(i))]);
  if(n>=2){ let d="M"+pts.map(p=>p[0]+" "+p[1]).join(" L ");
    s+=`<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`; }

  // 点＋点数
  for(let i=0;i<n;i++){ const [px,py]=pts[i], sc=ptScore(i), memo=ptMemo(i);
    const col=sc>0?'var(--pos)':sc<0?'var(--neg)':'var(--axis)'; const hm=memo&&memo.trim();
    s+=`<circle class="pt" cx="${px}" cy="${py}" r="${hm?6.5:5.5}" fill="${hm?col:'#fff'}" stroke="${col}" stroke-width="3" data-pt="${i}"></circle>`;
    if(sc!==0||hm){ const above=sc>=0;
      s+=`<text x="${px}" y="${py+(above?-11:18)}" text-anchor="middle" font-size="10" fill="${col}" font-weight="700">${fmt(sc)}</text>`; }
  }

  // 下部コメント（全件・段違い）
  bubbles.forEach(b=>{ const by=commentTop+b.lane*ROW;
    const lx=Math.max(b.bx+12,Math.min(b.x,b.bx+b.bw-12));
    s+=`<line x1="${b.x}" y1="${plotBottom}" x2="${lx}" y2="${by}" stroke="var(--accent)" stroke-width="1" opacity=".45"/>`;
    s+=`<rect x="${b.bx}" y="${by}" width="${b.bw}" height="${b.bh}" rx="8" fill="var(--card)" stroke="var(--line)"/>`;
    b.lines.forEach((l,li)=>{ s+=`<text x="${b.bx+cPad}" y="${by+cPad+12+li*cLineH}" font-size="${cFS}" fill="var(--ink)">${esc(l)}</text>`; });
  });

  chart.innerHTML=s;
}

/* ---------- ドラッグ入力 ---------- */
function svgPoint(e){ const r=chart.getBoundingClientRect(); computeLayout(); const CW=PADL+plotW()+padR;
  return {x:(e.clientX-r.left)*(CW/r.width), y:(e.clientY-r.top)*(H/r.height)}; }
function scoreFromY(y){ return Math.max(-100,Math.min(100,Math.round(100-(y-plotTop)/PLOTH*200))); }
function idxFromX(x){ computeLayout(); const n=nPts(); let best=0,bd=Infinity;
  for(let i=0;i<n;i++){ const d=Math.abs(x-LAY.cx[i]); if(d<bd){bd=d;best=i;} } return best; }
let dragging=false;
chart.addEventListener("pointerdown",e=>{ if(mode!=="draw")return; e.preventDefault();
  dragging=true; const p=svgPoint(e); setPtScore(idxFromX(p.x),scoreFromY(p.y)); drawThrottled(); chart.setPointerCapture(e.pointerId); });
chart.addEventListener("pointermove",e=>{ if(!dragging)return; const p=svgPoint(e); setPtScore(idxFromX(p.x),scoreFromY(p.y)); drawThrottled(); });
function endDrag(){ if(!dragging)return; dragging=false; renderList(); save(); }
chart.addEventListener("pointerup",endDrag); chart.addEventListener("pointercancel",endDrag);
chart.addEventListener("click",e=>{ if(mode!=="view")return; const c=e.target.closest("[data-pt]"); if(!c)return; openEditor(+c.dataset.pt); });

/* ---------- 編集モーダル ---------- */
function openEditor(i){
  const s=segs[i]; let m=$("editModal"); if(m)m.remove(); m=document.createElement("div"); m.id="editModal"; m.className="modal";
  m.innerHTML=`<div class="box"><h3>区分の編集</h3>
    <div class="frow"><label>区分名<input id="edName" type="text" value="${esc(s.name)}"></label>
      <label>色<input id="edColor" type="color" value="${s.color}"></label></div>
    <div class="frow"><label>開始年齢<input id="edA0" type="number" value="${s.a0}"></label>
      <label>終了年齢<input id="edA1" type="number" value="${s.a1}"></label>
      <label>点数<input id="edScore" type="number" min="-100" max="100" value="${s.score}"></label></div>
    <label>出来事メモ<textarea id="edMemo" placeholder="この時期の出来事・気持ち…">${esc(s.memo)}</textarea></label>
    <div class="acts"><button class="btn ghost" id="edClose">閉じる</button><button class="btn primary" id="edSave">保存</button></div></div>`;
  document.body.appendChild(m);
  m.addEventListener("click",e=>{ if(e.target===m)m.remove(); });
  $("edClose").onclick=()=>m.remove();
  $("edSave").onclick=()=>{
    s.name=$("edName").value||s.name; s.color=$("edColor").value;
    let a0=+$("edA0").value||0,a1=+$("edA1").value||0; if(a0>a1)[a0,a1]=[a1,a0]; s.a0=a0; s.a1=a1;
    s.score=Math.max(-100,Math.min(100,+($("edScore").value)||0)); s.memo=$("edMemo").value;
    m.remove(); sortSegs(); refreshAll(); save();
  };
  setTimeout(()=>$("edMemo").focus(),50);
}

/* ---------- PNG ---------- */
function showPngOverlay(url){
  let ov=$("pngOverlay"); if(ov)ov.remove(); ov=document.createElement("div"); ov.id="pngOverlay";
  ov.style.cssText="position:fixed;inset:0;background:#3a2c22cc;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px";
  ov.innerHTML=`<div style="color:#fff;font-size:13px;text-align:center">画像ができました。ボタンで保存、または画像を長押し／右クリックで保存できます。</div>
    <img src="${url}" style="max-width:92vw;max-height:70vh;border-radius:10px;box-shadow:0 8px 40px #0006;background:#fff">
    <div style="display:flex;gap:10px">
      <a href="${url}" download="${(meta.clientName||'lifegraph')}.png" style="background:#ed6a1e;color:#fff;text-decoration:none;font-weight:700;padding:11px 22px;border-radius:10px;font-size:14px">⬇ ダウンロード</a>
      <button id="pngClose" style="background:#fff;border:none;padding:11px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">閉じる</button></div>`;
  document.body.appendChild(ov); $("pngClose").onclick=()=>ov.remove(); ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
}
$("pngBtn").onclick=()=>{
  try{
    const cs=getComputedStyle(document.documentElement);
    const vars=["--ink","--ink-soft","--paper","--card","--line","--pos","--neg","--axis","--accent","--pos-fill","--neg-fill"];
    const CW=PADL+plotW()+padR, fullW=AXISW+CW, BAND=52, fullH=H+BAND;
    const title=(meta.clientName?meta.clientName+'　':'')+'人生グラフ'+(meta.sessionDate?'　'+meta.sessionDate:'');
    let raw=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${fullW} ${fullH}" width="${fullW}" height="${fullH}" style="background:var(--paper)">
      <g>${yaxisEl.innerHTML}</g><g transform="translate(${AXISW},0)">${chart.innerHTML}</g>
      <text x="${fullW/2}" y="${H+34}" text-anchor="middle" font-size="17" font-weight="700" fill="var(--ink)" font-family="sans-serif">${esc(title)}</text></svg>`;
    vars.forEach(v=>{ raw=raw.split(`var(${v})`).join(cs.getPropertyValue(v).trim()); });
    const url="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(raw);
    const img=new Image();
    img.onload=()=>{ try{ const scl=2,cv=document.createElement("canvas"); cv.width=fullW*scl; cv.height=fullH*scl;
        const ctx=cv.getContext("2d"); ctx.fillStyle=cs.getPropertyValue('--paper').trim(); ctx.fillRect(0,0,cv.width,cv.height);
        ctx.drawImage(img,0,0,cv.width,cv.height); const png=cv.toDataURL("image/png");
        const a=document.createElement("a"); a.href=png; a.download=(meta.clientName||"lifegraph")+".png"; document.body.appendChild(a); a.click(); a.remove(); showPngOverlay(png);
      }catch(err){ alert("画像生成に失敗：\n"+err.message); } };
    img.onerror=()=>alert("画像読込に失敗しました。区分やメモを減らしてお試しください。");
    img.src=url;
  }catch(err){ alert("書き出しエラー：\n"+err.message); }
};

(async()=>{ await load(); sortSegs(); refreshAll(); })();
</script>
